language: "ko-KR"
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false

  # 일반적인 제외 경로만 (프로젝트 공통)
  path_filters:
    - "!**/*.lock"
    - "!package-lock.json"
    - "!pnpm-lock.yaml"
    - "!yarn.lock"
    - "!.next/**"
    - "!out/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!public/**"
    - "!**/*.generated.*"

chat:
  auto_reply: true
